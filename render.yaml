services:
  - type: web
    name: customer-churn-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt && python model/train_model.py"
    startCommand: "gunicorn app:app"

  - type: web
    name: customer-churn-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://customer-churn-backend.onrender.com
